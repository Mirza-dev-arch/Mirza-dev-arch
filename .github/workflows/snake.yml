name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"      # Runs every day at midnight UTC
  workflow_dispatch:         # Allows manual trigger from GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Mirza-dev-arch
          outputs: |
            assets/images/github-contribution-grid-snake.svg
            assets/images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit & Push updated SVGs
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update snake animation (automated)"
          add: "assets/images/github-contribution-grid-snake*.svg"
